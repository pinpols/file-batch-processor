spring:
  quartz:
    auto-startup: false
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholder-replacement: true
    placeholders:
      user.dir: /tmp

batch:
  job:
    enabled: false

orchestration:
  enabled: false
