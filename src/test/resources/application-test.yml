spring:
  quartz:
    auto-startup: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholder-replacement: true
    placeholders:
      user.dir: /tmp

batch:
  job:
    enabled: false

orchestration:
  enabled: false
