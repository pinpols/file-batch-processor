spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/file_batch}
    username: ${SPRING_DATASOURCE_USERNAME:filebatch}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            misfireThreshold: 60000
            acquireTriggersWithinLock: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    placeholder-replacement: false
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8011}

batch:
  alert:
    enabled: ${BATCH_ALERT_ENABLED:true}
    failure-rate-threshold: ${BATCH_ALERT_FAILURE_RATE_THRESHOLD:0.2}
    dlq-backlog-threshold: ${BATCH_ALERT_DLQ_BACKLOG_THRESHOLD:100}
    min-throughput-rps-threshold: ${BATCH_ALERT_MIN_THROUGHPUT_RPS_THRESHOLD:5}
    webhook:
      enabled: ${BATCH_ALERT_WEBHOOK_ENABLED:false}
      url: ${BATCH_ALERT_WEBHOOK_URL:}

management:
  # 独立管理端口(网络层隔离运维面);默认回落到主端口(server.port)=与主端口同(向后兼容,探针可达),
  # prod 建议显式设 BATCH_MANAGEMENT_PORT 为独立端口。注意:别用 -1,那会禁用 actuator HTTP 导致探针失联。
  server:
    port: ${BATCH_MANAGEMENT_PORT:${server.port:8011}}
  endpoints:
    web:
      exposure:
        # 去掉 metrics(prometheus 已覆盖且暴露更少内部细节)
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # prod 不对匿名暴露组件级 health 详情
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name:file-batch-processor}

logging:
  level:
    root: INFO
    com.example.filebatchprocessor: INFO

orchestration:
  config-source: ${ORCHESTRATION_CONFIG_SOURCE:db}
