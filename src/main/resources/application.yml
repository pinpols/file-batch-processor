# ============================================================
# File Batch Processor - 默认配置（application.yml）
# 中文说明：
# 1) 本文件提供“本地可运行”的默认值
# 2) 生产环境请使用 application-prod.yml + 环境变量覆盖
# 3) 任务定义以 DB 为主（orchestration.config-source=db）
# ============================================================

server:
  # 应用 HTTP 端口
  port: 8011
  # #23 优雅停机:SIGTERM 后等在途请求/任务收尾再退出,而非直接 kill
  shutdown: graceful

spring:
  # 默认激活 dev；生产请通过 --spring.profiles.active=prod 覆盖
  profiles.active: dev
  # #23 优雅停机阶段超时:给在途批处理/编排 drain 收尾的时间上限
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: file-batch-processor
  batch:
    job:
      # 关闭 Spring Batch 启动即执行，统一由调度器触发
      enabled: false
  quartz:
    # Quartz 启动由编排初始化流程控制
    auto-startup: false
    # 不覆盖 DB 中已存在的 Job/Trigger，避免误改历史调度
    overwrite-existing-jobs: false
    # JDBC JobStore：触发器持久化到 QRTZ_* 表（由 Flyway V1_20 建表）。
    # 放在 base 而非仅 dev/prod，避免无 profile 启动时退回 MEMORY 丢调度。
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            # Quartz 调度器名（对应 qrtz_* 的 sched_name）
            instanceName: fileBatchQuartzScheduler
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            misfireThreshold: 60000
            acquireTriggersWithinLock: true
          threadPool:
            # Quartz 调度线程数（不是业务执行线程）
            threadCount: 8
  datasource:
    # 默认连本机 PostgreSQL；生产请使用专用库和专用账号
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    # 统一用 Flyway 管理 DDL；禁止应用启动时自动建表
    enabled: true
    placeholder-replacement: false
    locations: classpath:db/migration
  h2:
    console:
      enabled: false
      path: /h2-console
  mail:
    # email 告警渠道用；全 env 注入，关闭时无副作用
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 3000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
management:
  endpoints:
    web:
      exposure:
        # 暴露健康检查、Prometheus 指标等端点(去掉 beans,避免泄漏内部 bean 拓扑)
        include: health,info,prometheus,metrics
  endpoint:
    health:
      # 仅对已认证用户展示详情,避免匿名探测泄漏内部信息
      show-details: when_authorized

batch:
  io:
    # 导入/导出文件路径基目录(配置后强制限定在其内,防路径穿越;留空则仅拒绝 .. 逃逸)
    input-base-dir: ${BATCH_IO_INPUT_BASE_DIR:}
    output-base-dir: ${BATCH_IO_OUTPUT_BASE_DIR:}
    # 导入预处理临时明文文件目录；空=系统临时目录下 fbp-import-tmp
    temp-dir: ${BATCH_IO_TEMP_DIR:}
  file-export:
    # tasklet 式文件导出一次性物化进内存的行数上界,超过应改用流式 dataExportJob
    max-rows: ${BATCH_FILE_EXPORT_MAX_ROWS:500000}
  schema:
    startup-bootstrap:
      # 仅兜底，主路径必须走 Flyway
      enabled: false
  pgp:
    # 导入 PGP 解密：私钥(secret key ring)路径 + passphrase；passphrase 走 env 不入仓
    private-key-path: ${BATCH_PGP_PRIVATE_KEY_PATH:}
    passphrase: ${BATCH_PGP_PASSPHRASE:}
  alert:
    # 批量告警：失败率、吞吐、DLQ 积压
    enabled: true
    min-severity: WARNING
    failure-rate-threshold: 0.2
    dlq-backlog-threshold: 100
    dlq-manual-threshold: 20
    min-throughput-rps-threshold: 5
    channels:
      webhook:
        enabled: false
        url: ""
      email:
        enabled: false
        from: "alert@example.com"
        to: ""
      im:
        enabled: false
        url: ""
    # 兼容旧 key：WebhookAlertSender 回落到 batch.alert.webhook.url
    webhook:
      enabled: false
      url: ""
  retention:
    # 数据保留策略（按天清理）
    enabled: true
    cron: "0 30 3 * * ?"
    dedup-days: 7
    task-state-days: 30
    dlq-handled-days: 30
    batch-run-days: 90
  dlq:
    # DLQ 自动重放上限与重试间隔
    max-replay-count: 5
    retry-delay-ms: 60000
  import:
    # 导入质量门禁：解析错误率/重复率
    parse-error:
      max-rate: 0.2
      min-lines: 50
      # 按 jobName 覆盖默认阈值
      rules:
        fileImportJob:
          max-rate: 0.1
          min-lines: 20
    duplicate:
      max-rate: 0.0
      min-lines: 100
  file:
    reception:
      partial:
        # 半文件防护：拒绝临时后缀名，必要时要求 .done，兜底做稳定大小检测
        temp-suffixes: .part,.tmp,.upload
        require-done-marker: false
        done-marker-suffix: .done
        stable-size-check-enabled: true
        stable-size-check-rounds: 2
        stable-size-check-interval-ms: 200
      group:
        enabled: false
        manifest-suffix: .manifest.json
        poll-rate-ms: 120000
        ttl-minutes: 360

file:
  alert:
    # 文件级告警外置化的最小严重级别
    externalize-min-severity: CRITICAL

orchestration:
  # 配置来源：db（推荐）| yaml（仅 local/dev）
  config-source: ${ORCHESTRATION_CONFIG_SOURCE:db}
  # 危险开关：true 时启动会清理 orchestration 组 Quartz 持久化记录
  # 默认 false，除非需要“重建调度快照”再临时打开
  quartz:
    reset-on-startup: false
  scheduler:
    # 编排线程池（非业务执行线程）
    pool-size: 4
    max-queue-size: 2000
    max-concurrent-launches: 4
    # 队列背压：达到阈值时延迟入队
    backpressure-threshold: 1500
    backpressure-delay-ms: 5000
    fixed-delay:
      # FIXED_DELAY 语义的最小重排间隔与最大重排速率
      min-requeue-interval-ms: 2000
      max-requeue-per-minute: 60
      # 连续失败时退避策略
      failure-backoff-multiplier: 2.0
      max-backoff-ms: 300000
    # 默认调度治理参数（任务级未配置时生效）
    default-max-queue-wait-ms: 300000
    default-timeout-ms: 1800000
    default-dynamic-shard-max: 1
    default-dependency-timeout-ms: 600000
    default-rerun-window-ms: 86400000
    default-retry-backoff-ms: 60000
    default-retry-jitter-ratio: 0.0
    default-max-attempts: 3
    # 多节点协调统一由自研 Leader 锁（scheduler_leader_lock，见下方 leader 段）负责：
    # 只有持锁实例注册触发与 drain 队列；不依赖 Quartz 原生集群模式。
    # Misfire 策略（错过触发点后的恢复）
    misfire:
      enabled: true
      detection-window-ms: 300000 # 5 分钟
      recovery-delay-ms: 30000 # 30 秒
      max-recovery-attempts: 3
      check-interval-ms: 60000 # 1 分钟
    # 日历排除：周末/节假日/时间窗
    calendar-exclusion:
      enabled: true
      exclude-weekends: true
      default-calendar: default
      holidays:
        default:
          - "01-01" # 元旦
          - "05-01" # 劳动节
          - "10-01" # 国庆节
          - "12-25" # 圣诞节
          - "2025-02-10" # 春节示例
        business:
          - "01-01"
          - "05-01"
          - "10-01"
      exclude-time-windows:
        default:
          - "22:00-06:00" # 夜间维护窗口
          - "12:00-13:00" # 午休时间
        business:
          - "18:00-08:00" # 非工作时间
    # 针对 jobName 或 jobName:targetSystem 的并发上限
    max-concurrent-by-key:
      fileImportJob: 2
      fileExportJob: 1
      fileImportJob:SFTP: 1
    # 周期性 drain tick:重新驱动 drainQueue 以重查 WAITING/被限流任务,替代忙旋
    drain-tick-ms: 3000
    # 状态对账周期与僵尸 RUNNING 判定阈值
    reconcile-interval-ms: 60000
    reconcile-stale-running-ms: 3600000
    leader:
      # 自研 Leader 锁（scheduler_leader_lock）
      lock-name: orchestration-scheduler
      ttl-seconds: 30
      refresh-ms: 5000
  # 熔断器：按 targetSystem 统计失败率，达到阈值后进入冷却
  circuit-breaker:
    window-size: 10
    failure-rate-threshold: 0.5
    cooldown-duration-ms: 300000

# 质量门禁强制阻断的全局默认值（opt-in 硬闸门）。
# false=保持「软降级 PARTIAL」原行为；true=任一质量门 FAIL 即把作业判为 FAILED。
# 也可按作业用 job 参数 quality.enforce=true/false 覆盖（参数优先级高于此默认）。
quality:
  enforce-default: ${QUALITY_ENFORCE_DEFAULT:false}

# SFTP 默认配置（开发/测试）
sftp:
  host: ${SFTP_HOST:}
  port: ${SFTP_PORT:22}
  username: ${SFTP_USERNAME:}
  password: ${SFTP_PASSWORD:}
  remoteDir: ${SFTP_REMOTE_DIR:/upload}
  # 主机密钥校验:配置 known_hosts 文件路径以启用严格校验(留空则加载默认 ~/.ssh/known_hosts，缺失即拒连)
  known-hosts-path: ${SFTP_KNOWN_HOSTS_PATH:}
  # 仅本地/测试可设 true 跳过主机密钥校验(生产禁用)
  insecure-skip-host-key-check: ${SFTP_INSECURE_SKIP_HOST_KEY_CHECK:false}

# 文件分发安全
distribution:
  # HTTP/FTP 目标 host 白名单(逗号分隔,留空=不限制白名单)。这是 SSRF 的主控制:生产建议显式配置。
  allowed-hosts: ${DISTRIBUTION_ALLOWED_HOSTS:}
  # 是否额外拦截内网/环回/链路本地/云元数据地址。默认 false(向内网分发文件是合法主用途);
  # 在不可信网络环境可设 true 加固 SSRF。
  block-internal-targets: ${DISTRIBUTION_BLOCK_INTERNAL_TARGETS:false}

ops:
  security:
    # 运维接口基础认证（viewer/operator/admin 三角色）
    enabled: ${OPS_SECURITY_ENABLED:true}
    viewer:
      username: ${OPS_VIEWER_USERNAME:viewer}
      password: ${OPS_VIEWER_PASSWORD:{noop}change_me_viewer}
    operator:
      username: ${OPS_OPERATOR_USERNAME:operator}
      password: ${OPS_OPERATOR_PASSWORD:{noop}change_me_operator}
    admin:
      username: ${OPS_ADMIN_USERNAME:admin}
      password: ${OPS_ADMIN_PASSWORD:{noop}change_me_admin}
