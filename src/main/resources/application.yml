server:
  port: 8080

spring:
  application:
    name: file-batch-processor
  batch:
    job:
      enabled: false  # Disable auto-start of jobs
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
      path: /h2-console

# XXL-Job Admin Addresses: such as "http://address" or "http://address01,http://address02"
# If you don't have XXL-Job Admin running, comment out the addresses line or set it to empty string
# The application can still run without XXL-Job Admin, but XXL-Job scheduling features won't work
xxl:
  job:
    admin:
      # addresses: http://localhost:8080/xxl-job-admin  # Uncomment and set correct address when XXL-Job Admin is available
      addresses:  # Empty to disable XXL-Job registration (application will still work)
    accessToken: default_token
    executor:
      appname: file-batch-executor
      address: 
      ip: 
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30

orchestration:
  tasks:
    - id: process-file-cron
      jobName: processFileJob
      priority: HIGH
      dedupKey: process-file-cron
      allowParallel: true
      trigger:
        type: CRON
        cron: "0 0/10 * * * ?"
      parameters:
        input.file.name: C:\Users\aa\CascadeProjects\file-batch-processor\src\main\resources\data\sample.csv
    - id: process-file-fixed
      jobName: processFileJob
      priority: NORMAL
      allowParallel: true
      trigger:
        type: FIXED_RATE
        fixedRateMs: 300000
      parameters:
        input.file.name: C:\Users\aa\CascadeProjects\file-batch-processor\src\main\resources\data\sample.csv
    - id: process-file-backfill-20250101
      jobName: processFileJob
      priority: HIGH
      allowParallel: true
      trigger:
        type: ONE_TIME
        oneTimeAt: 2025-01-01T02:00:00Z
      parameters:
        input.file.name: C:\Users\aa\CascadeProjects\file-batch-processor\src\main\resources\data\sample.csv
        batchDate: "2025-01-01"
        runMode: backfill
        rerunId: bf-20250101
    - id: data-export-daily
      jobName: dataExportJob
      priority: NORMAL
      allowParallel: true
      trigger:
        type: CRON
        cron: "0 1 0 * * ?"
      parameters:
        export.sql: "select id, business_key, name, description, batch_date from imported_records where batch_date = '2025-01-01'"
        output.file.name: "export/data_export_20250101.csv"
    # ===================== 4 个核心功能任务配置 =====================
    - id: partitioned-import-daily
      jobName: partitionedImportJob
      priority: HIGH
      allowParallel: false
      trigger:
        type: CRON
        cron: "0 0 1 * * ?"
      parameters:
        batchDate: ""
    - id: file-export-daily
      jobName: fileExportJob
      priority: NORMAL
      allowParallel: false
      trigger:
        type: CRON
        cron: "0 0 2 * * ?"
      parameters:
        batchDate: ""
        format: "csv"
        outputDir: "export"
    - id: file-reception-monitor
      jobName: fileReceptionJob
      priority: NORMAL
      allowParallel: true
      trigger:
        type: FIXED_RATE
        fixedRateMs: 600000
      parameters: {}
    - id: file-reception-timeout-check
      jobName: fileReceptionTimeoutJob
      priority: NORMAL
      allowParallel: true
      trigger:
        type: CRON
        cron: "0 0 */6 * * ?"
      parameters: {}
    - id: file-distribution-pending
      jobName: fileDistributionJob
      priority: HIGH
      allowParallel: true
      trigger:
        type: FIXED_RATE
        fixedRateMs: 300000
      parameters: {}
    - id: file-distribution-retry
      jobName: fileDistributionRetryJob
      priority: NORMAL
      allowParallel: true
      trigger:
        type: FIXED_RATE
        fixedRateMs: 900000
      parameters: {}
    - id: file-distribution-timeout
      jobName: fileDistributionTimeoutJob
      priority: NORMAL
      allowParallel: true
      trigger:
        type: CRON
        cron: "0 0 */12 * * ?"
      parameters: {}

# SFTP 默认示例配置（用于开发/测试）
sftp:
  host: 127.0.0.1
  port: 22
  username: root
  password: root
  remoteDir: /upload