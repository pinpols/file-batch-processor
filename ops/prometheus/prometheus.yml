global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/batch-alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: file-batch-processor
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8011
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: file-batch-app
