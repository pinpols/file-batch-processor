name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  full-test:
    name: Full Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Run full test
        run: ./mvnw -B -ntp -Pfull-test test

      - name: Run e2e test
        run: ./mvnw -B -ntp -Pe2e-test test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-reports
          path: |
            **/target/surefire-reports/**
          if-no-files-found: ignore

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: full-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Run OWASP Dependency Check
        run: ./mvnw -B -ntp -DskipTests org.owasp:dependency-check-maven:check

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dependency-check-report
          path: |
            **/target/dependency-check-report.*
          if-no-files-found: ignore

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: full-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.69.3

      - name: Run Trivy filesystem scan
        run: trivy fs . --severity HIGH,CRITICAL --exit-code 1 --format table
