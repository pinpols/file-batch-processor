name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  build-and-unit-test:
    name: Build and Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Validate Maven Wrapper
        run: ./mvnw -v

      - name: Compile
        run: ./mvnw -B -ntp -DskipTests compile

      - name: Run Unit Tests
        run: ./mvnw -B -ntp -Punit-test test

      - name: Package
        run: ./mvnw -B -ntp -DskipTests package

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/target/surefire-reports/**
          if-no-files-found: ignore

      - name: Upload packaged artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts
          path: |
            **/target/*.jar
            **/target/*.war
          if-no-files-found: ignore

  code-quality:
    name: Code Quality (Spotless + SpotBugs)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Spotless format check
        run: ./mvnw -B -ntp spotless:check

      - name: SpotBugs static analysis
        run: ./mvnw -B -ntp -DskipTests compile spotbugs:check

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-unit-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Run Integration Tests
        run: ./mvnw -B -ntp -Pintegration-test test

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            **/target/surefire-reports/**
          if-no-files-found: ignore

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-unit-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw

      - name: Run OWASP Dependency Check
        run: ./mvnw -B -ntp -DskipTests org.owasp:dependency-check-maven:check

      - name: Upload dependency check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            **/target/dependency-check-report.*
          if-no-files-found: ignore

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-unit-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.69.3

      - name: Run Trivy filesystem scan
        run: trivy fs . --severity HIGH,CRITICAL --exit-code 1 --format table

  verify-project-structure:
    name: Verify Project Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Maven wrapper files
        run: |
          test -f mvnw
          test -f mvnw.cmd
          test -d .mvn/wrapper
