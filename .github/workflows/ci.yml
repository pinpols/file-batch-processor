name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile
        run: ./mvnw -B -DskipTests compile

      - name: Unit Tests
        run: ./mvnw -B test

      - name: Integration Tests (requires Docker)
        run: ./mvnw -B -Pintegration-test test

      - name: OWASP Dependency Check
        run: ./mvnw -B -DskipTests org.owasp:dependency-check-maven:check

  trivy-fs-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
